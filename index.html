<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e6a" />
<title>Berie’s exam space</title>
<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9; --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --good:#1f8a4c; --good-soft:#e2f3e8;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:20px; --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515; --violet:#a99cf0; --violet-soft:#221d3a;
    --good:#46c178; --good-soft:#16301f;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.55;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button,a{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px 80px}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:8px}
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}

  header.top{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px)}
  .topin{max-width:820px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:17px;flex:none;box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;min-height:38px;padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;align-items:center;transition:border-color .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:scale(.96)}

  .hero{text-align:center;margin:36px 0 4px}
  .hero h1{font-size:29px;margin:0 0 8px}
  .hero p{margin:0 auto;color:var(--muted);max-width:30em}

  .backlink{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 0;margin:6px 0 2px;transition:color .2s var(--ease)}
  .backlink:hover{color:var(--accent-ink)} .backlink .ic{width:16px;height:16px}
  .seclabel{display:flex;align-items:center;gap:8px;margin:22px 0 14px;font-weight:700;font-size:16px}
  .seclabel .ic{width:18px;height:18px;color:var(--accent-ink)}

  .grid{display:grid;gap:16px} @media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}

  .track{position:relative;display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);overflow:hidden;transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  .track:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)} .track:active{transform:translateY(-1px) scale(.995)}
  .track.alt:hover{border-color:var(--violet)}
  .track .tile{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:2px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .track.alt .tile{background:linear-gradient(150deg,var(--violet),#4f40a8);box-shadow:0 6px 16px rgba(109,91,208,.32)}
  .track .tile .ic{width:26px;height:26px;stroke-width:1.9}
  .track b{font-size:19px} .track small{color:var(--muted);font-size:14px;line-height:1.5}
  .track .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:14px}
  .track.alt .go{color:var(--violet)} .track .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)}
  .track:hover .go .ic{transform:translateX(3px)}

  .vak{position:relative;display:flex;flex-direction:column;gap:9px;text-align:left;width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);text-decoration:none;color:inherit;overflow:hidden;transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  button.vak:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)} button.vak:active{transform:translateY(-1px) scale(.995)}
  .vak.soon{opacity:.72;cursor:default}
  .vak.ghost{background:transparent;border-style:dashed;box-shadow:none;align-items:center;justify-content:center;text-align:center;color:var(--muted);min-height:150px;cursor:default}
  .tile{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:2px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .tile.a{background:linear-gradient(150deg,var(--amber),#9c5f12);box-shadow:0 6px 16px rgba(201,130,31,.3)}
  .tile .ic{width:26px;height:26px;stroke-width:1.9}
  .vak b{font-size:19px} .vak small{color:var(--muted);font-size:14px;line-height:1.5}
  .vak .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:14px}
  .vak .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)} button.vak:hover .go .ic{transform:translateX(3px)}
  .pill{position:absolute;top:16px;right:16px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--good-soft);color:var(--good);display:inline-flex;align-items:center;gap:5px;letter-spacing:.2px}
  .pill.soon{background:var(--amber-soft);color:var(--amber)} html[data-theme="dark"] .pill.soon{background:#2e2515;color:#e0a64a}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.8s var(--ease) infinite}
  .ghost .plus{width:42px;height:42px;border-radius:50%;border:1.5px dashed var(--line);display:grid;place-items:center;margin-bottom:10px} .ghost .plus .ic{width:20px;height:20px}

  .modebanner{display:flex;align-items:center;gap:10px;margin:0 0 14px;padding:11px 14px;border-radius:var(--r);background:var(--accent-soft);color:var(--accent-ink);font-size:13.5px;font-weight:600}
  .modebanner.v{background:var(--violet-soft);color:var(--violet)} .modebanner .ic{width:18px;height:18px}
  .warmcard{border:1.5px solid var(--violet);background:var(--violet-soft);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;gap:11px;align-items:flex-start}
  .warmcard .ic{width:22px;height:22px;color:var(--violet);flex:none}
  .warmcard p{margin:5px 0 0;color:var(--muted);font-size:13.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px}
  .row{display:flex;gap:14px;align-items:center;justify-content:space-between}
  .toggle{width:48px;height:28px;border-radius:999px;border:none;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s var(--ease)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s var(--ease)}
  .toggle.on{background:var(--violet)} .toggle.on .knob{left:23px}

  footer{margin-top:38px;text-align:center;color:var(--muted);font-size:13px}

  @keyframes fwd{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
  @keyframes bwd{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: no-preference){
    .view-fwd{animation:fwd .34s var(--ease) both} .view-bwd{animation:bwd .34s var(--ease) both}
  }
  @media (prefers-reduced-motion: reduce){
    .view-fwd,.view-bwd{animation:fade .2s ease both} *{transition-duration:.001ms!important}
  }
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="brand"><span class="logo">B</span><div>Berie’s exam space<small>oefen voor je examen</small></div></div>
    <span class="spacer"></span>
    <button class="iconbtn" id="themeBtn" aria-label="Wissel tussen licht en donker thema"></button>
  </div>
</header>
<div class="wrap"><div id="view"></div>
  <footer>Gemaakt om mee te oefenen · veel succes! 💪</footer>
</div>

<script>
(function(){
  "use strict";
  var P={
    book:'<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>',
    sprout:'<path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>',
    heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
    flask:'<path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.58 16.5h12.85"/>',
    chart:'<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
    plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
    sparkles:'<path d="M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.14-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.14a.5.5 0 0 1 .96 0L14.06 8.5A2 2 0 0 0 15.5 9.94l6.14 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.14a.5.5 0 0 1-.96 0z"/>',
    back:'<path d="m15 18-6-6 6-6"/>',
    sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
    moon:'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
    arrowR:'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>'
  };
  function ic(n){ return '<svg class="ic" viewBox="0 0 24 24" aria-hidden="true">'+(P[n]||"")+'</svg>'; }
  function ls(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lset(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  var view=document.getElementById("view");
  var theme = ls("site_theme") || "light";
  function applyTheme(){ document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeBtn").innerHTML=(theme==="dark"?ic("sun"):ic("moon"))+'<span>'+(theme==="dark"?"Licht":"Donker")+'</span>'; }
  applyTheme();
  document.getElementById("themeBtn").onclick=function(){ theme=theme==="dark"?"light":"dark"; lset("site_theme",theme); lset("mbg_theme",theme); applyTheme(); };

  var calm = ls("bes_calm")!=="0";
  var state = { step:"track", track:"training" };

  var VAKKEN=[
    { title:"MBG — Biologie & Genetica", desc:"Menselijke biologie en genetica.", icon:"flask", tile:"", href:"mbg/", status:"live" },
    { title:"Statistiek II", desc:"SPSS & statistiek.", icon:"chart", tile:"a", href:"stat/", status:"live" }
  ];

  function paint(html, dir){
    view.innerHTML=html;
    view.classList.remove("view-fwd","view-bwd"); void view.offsetWidth;
    view.classList.add(dir==="back"?"view-bwd":"view-fwd");
    window.scrollTo(0,0);
  }

  function renderTrack(dir){
    var html=
      '<div class="hero"><h1>Hoe wil je oefenen?</h1><p>Kies je manier van oefenen. Daarna kies je je vak.</p></div>'+
      '<div class="grid">'+
        '<button class="track" data-track="training"><span class="tile">'+ic("book")+'</span><b>Examen Training</b><small>Oefen op echt examenniveau. Directe feedback en uitleg bij elke vraag.</small><span class="go">Normaal niveau '+ic("arrowR")+'</span></button>'+
        '<button class="track alt" data-track="herkansing"><span class="tile">'+ic("sprout")+'</span><b>Herkansing</b><small>Rustig weer opbouwen, met begeleiding en aanmoediging. Jij bepaalt het tempo.</small><span class="go">Met begeleiding '+ic("arrowR")+'</span></button>'+
      '</div>';
    paint(html, dir);
    [].slice.call(view.querySelectorAll(".track")).forEach(function(el){ el.onclick=function(){ state.track=el.dataset.track; state.step="vak"; renderVak("fwd"); }; });
  }

  function renderVak(dir){
    var herk = state.track==="herkansing";
    var warm = herk && calm
      ? '<div class="warmcard">'+ic("heart")+'<div><b>Een nieuwe kans — rustig aan.</b><p>Herkansen betekent niet dat je het niet kunt. Stap voor stap kom je er. Jij kunt dit. 💚</p></div></div>'
      : '';
    var toggle = herk
      ? '<div class="card" style="margin-bottom:14px"><div class="row"><div><b>Rustige modus</b><div style="color:var(--muted);font-size:12.5px">Aanmoediging en kalme sfeer. Zet uit als je liever recht-voor-z’n-raap oefent.</div></div><button class="toggle'+(calm?" on":"")+'" id="calmToggle" role="switch" aria-checked="'+(calm?"true":"false")+'" aria-label="Rustige modus aan of uit"><span class="knob"></span></button></div></div>'
      : '';
    var cards = VAKKEN.map(function(v){
      if(v.status==="live") return '<button class="vak" data-href="'+v.href+'"><span class="pill"><span class="dot"></span>Live</span><span class="tile '+v.tile+'">'+ic(v.icon)+'</span><b>'+v.title+'</b><small>'+v.desc+'</small><span class="go">Openen '+ic("arrowR")+'</span></button>';
      return '<div class="vak soon"><span class="pill soon">In de maak</span><span class="tile '+v.tile+'">'+ic(v.icon)+'</span><b>'+v.title+'</b><small>'+v.desc+'</small><span class="go" style="color:var(--muted)">Binnenkort</span></div>';
    }).join("");
    cards += '<div class="vak ghost"><span class="plus">'+ic("plus")+'</span><b style="font-size:15px">Meer vakken volgen</b><small>Nieuwe vakken komen erbij zodra het materiaal klaar is.</small></div>';
    var html=
      '<button class="backlink" id="backBtn">'+ic("back")+'Terug</button>'+
      '<div class="modebanner'+(herk?" v":"")+'">'+ic(herk?"sprout":"book")+'<span>'+(herk?"Herkansing":"Examen Training")+'</span></div>'+
      warm + toggle +
      '<div class="seclabel">'+ic("sparkles")+'Welk vak wil je oefenen?</div>'+
      '<div class="grid">'+cards+'</div>';
    paint(html, dir);
    document.getElementById("backBtn").onclick=function(){ state.step="track"; renderTrack("back"); };
    var ct=document.getElementById("calmToggle"); if(ct) ct.onclick=function(){ calm=!calm; lset("bes_calm",calm?"1":"0"); renderVak("fwd"); };
    [].slice.call(view.querySelectorAll(".vak[data-href]")).forEach(function(el){ el.onclick=function(){
      var u=el.dataset.href+"?m="+state.track+"&calm="+(calm?"1":"0");
      window.location.href=u;
    }; });
  }

  renderTrack("fwd");
})();
</script>
</body>
</html>
