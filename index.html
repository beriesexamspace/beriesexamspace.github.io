<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e6a" />
<title>Berie’s exam space — kies je vak</title>
<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9;
    --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:22px; --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515;
    --violet:#a99cf0; --violet-soft:#221d3a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.55;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button,a{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px 80px}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:8px}
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;stroke:currentColor;stroke-width:1.75;
    stroke-linecap:round;stroke-linejoin:round;fill:none}

  header.top{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px)}
  .topin{max-width:820px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));
    color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:17px;flex:none;
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;min-height:38px;
    padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;align-items:center;
    transition:border-color .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:scale(.96)}

  .hero{text-align:center;margin:42px 0 30px}
  .hero h1{font-size:30px;margin:0 0 8px}
  .hero p{margin:0 auto;color:var(--muted);max-width:30em}

  .grid{display:grid;gap:16px}
  @media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}

  .vak{position:relative;display:flex;flex-direction:column;gap:9px;text-align:left;width:100%;
    border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:22px;
    box-shadow:var(--shadow);text-decoration:none;color:inherit;overflow:hidden;
    transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  a.vak:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
  a.vak:active{transform:translateY(-1px) scale(.995)}
  .vak.soon{opacity:.72;cursor:default}
  .vak.ghost{background:transparent;border-style:dashed;box-shadow:none;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);min-height:150px;cursor:default}
  .tile{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:2px;
    background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .tile.v{background:linear-gradient(150deg,var(--violet),#4f40a8);box-shadow:0 6px 16px rgba(109,91,208,.32)}
  .tile.a{background:linear-gradient(150deg,var(--amber),#9c5f12);box-shadow:0 6px 16px rgba(201,130,31,.3)}
  .tile .ic{width:26px;height:26px;stroke-width:1.9}
  .vak b{font-size:19px}
  .vak small{color:var(--muted);font-size:14px;line-height:1.5}
  .vak .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:14px}
  .vak .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)}
  a.vak:hover .go .ic{transform:translateX(3px)}
  .pill{position:absolute;top:16px;right:16px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;
    background:var(--good-soft,#e2f3e8);color:#1f8a4c;display:inline-flex;align-items:center;gap:5px;letter-spacing:.2px}
  html[data-theme="dark"] .pill{background:#16301f;color:#46c178}
  .pill.soon{background:var(--amber-soft);color:var(--amber)}
  html[data-theme="dark"] .pill.soon{background:#2e2515;color:#e0a64a}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.8s var(--ease) infinite}
  .ghost .plus{width:42px;height:42px;border-radius:50%;border:1.5px dashed var(--line);display:grid;place-items:center;margin-bottom:10px}
  .ghost .plus .ic{width:20px;height:20px}

  footer{margin-top:38px;text-align:center;color:var(--muted);font-size:13px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: no-preference){
    .hero,.vak{animation:fadeUp .42s var(--ease) both}
    .vak:nth-child(2){animation-delay:.08s} .vak:nth-child(3){animation-delay:.16s} .vak:nth-child(4){animation-delay:.24s}
  }
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms!important;transition-duration:.001ms!important} }
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="brand"><span class="logo">B</span><div>Berie’s exam space<small>kies je vak en oefen</small></div></div>
    <span class="spacer"></span>
    <button class="iconbtn" id="themeBtn" aria-label="Wissel tussen licht en donker thema"></button>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>Welk vak wil je oefenen?</h1>
    <p>Kies hieronder een vak. Elke tool heeft oefenvragen met directe feedback, uitleg en je voortgang — op je telefoon én computer.</p>
  </div>
  <div class="grid" id="vakken"></div>
  <footer>Gemaakt om mee te oefenen · veel succes! 💪</footer>
</div>

<script>
(function(){
  "use strict";
  var P={
    flask:'<path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.58 16.5h12.85"/>',
    chart:'<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
    plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
    sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
    moon:'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
    arrowR:'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>'
  };
  function ic(n){ return '<svg class="ic" viewBox="0 0 24 24" aria-hidden="true">'+(P[n]||"")+'</svg>'; }
  function ls(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lset(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  var theme = ls("site_theme") || ls("mbg_theme") || "light";
  function applyTheme(){ document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeBtn").innerHTML=(theme==="dark"?ic("sun"):ic("moon"))+'<span>'+(theme==="dark"?"Licht":"Donker")+'</span>'; }
  applyTheme();
  document.getElementById("themeBtn").onclick=function(){ theme=theme==="dark"?"light":"dark"; lset("site_theme",theme); lset("mbg_theme",theme); applyTheme(); };

  var VAKKEN=[
    { title:"MBG — Biologie & Genetica", desc:"Menselijke biologie en genetica. Oefenexamen, oude examenvragen, studie-hacks en samenvattingen.",
      icon:"flask", tile:"", href:"mbg/", status:"live" },
    { title:"Statistiek II", desc:"Statistiek voor het examen. De oefentool wordt gemaakt op basis van je samenvatting.",
      icon:"chart", tile:"a", href:null, status:"soon" }
  ];

  var html = VAKKEN.map(function(v){
    if(v.status==="live"){
      return '<a class="vak" href="'+v.href+'">'+
        '<span class="pill"><span class="dot"></span>Live</span>'+
        '<span class="tile '+v.tile+'">'+ic(v.icon)+'</span>'+
        '<b>'+v.title+'</b><small>'+v.desc+'</small>'+
        '<span class="go">Openen '+ic("arrowR")+'</span></a>';
    }
    return '<div class="vak soon">'+
      '<span class="pill soon">In de maak</span>'+
      '<span class="tile '+v.tile+'">'+ic(v.icon)+'</span>'+
      '<b>'+v.title+'</b><small>'+v.desc+'</small>'+
      '<span class="go" style="color:var(--muted)">Binnenkort beschikbaar</span></div>';
  }).join("");
  html += '<div class="vak ghost"><span class="plus">'+ic("plus")+'</span><b style="font-size:15px">Meer vakken volgen</b>'+
    '<small>Nieuwe vakken komen er gewoon bij zodra het materiaal klaar is.</small></div>';

  document.getElementById("vakken").innerHTML=html;
})();
</script>
</body>
</html>
