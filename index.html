<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e6a" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>Berie’s exam space</title>
<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9; --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --good:#1f8a4c; --good-soft:#e2f3e8;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:20px; --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515; --violet:#a99cf0; --violet-soft:#221d3a;
    --good:#46c178; --good-soft:#16301f;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.55;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button,a{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px 80px}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:10px;box-shadow:0 0 0 4px var(--accent-soft)}
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}

  header.top{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);box-shadow:inset 0 -1px 0 0 rgba(0,0,0,.04)}
  .topin{max-width:820px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:17px;flex:none;box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;min-height:38px;padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;align-items:center;transition:border-color .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:scale(.96)}

  .hero{text-align:center;margin:36px 0 4px}
  .hero h1{font-size:29px;margin:0 0 8px}
  .hero p{margin:0 auto;color:var(--muted);max-width:30em}

  .bighero{text-align:center;margin:34px 0 26px;padding:0 8px}
  .biglogo{width:74px;height:74px;border-radius:20px;margin:0 auto 16px;display:grid;place-items:center;color:#fff;
    font-family:Georgia,serif;font-weight:700;font-size:38px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));
    box-shadow:0 0 24px rgba(15,110,106,.16),0 12px 32px rgba(15,110,106,.30)}
  .bighero h1{font-size:40px;margin:0 0 10px;line-height:1.05}
  .bighero p{margin:0 auto;color:var(--muted);max-width:34em;font-size:16px}
  @media(min-width:600px){.bighero{margin:52px 0 30px} .bighero h1{font-size:50px} .biglogo{width:84px;height:84px;font-size:44px}}
  .seclabel.center{justify-content:center;text-align:center;margin:8px 0 16px}

  /* ---- Premium launch (Gemini-stijl: levende gradient-gloed, sparkle, shimmer) ---- */
  @property --bes-a{syntax:'<angle>';initial-value:0deg;inherits:false}
  #splash{position:fixed;inset:0;z-index:100;display:grid;place-items:center;
    background:radial-gradient(125% 125% at 50% 38%, var(--bg2) 0%, var(--bg) 68%);
    transition:opacity .6s var(--ease),transform .7s var(--ease)}
  #splash.hide{opacity:0;transform:scale(1.07);pointer-events:none}
  .sp-inner{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center}
  .sp-mark{position:relative;width:100px;height:100px;display:grid;place-items:center}
  .sp-mark::before{content:"";position:absolute;inset:-16px;border-radius:34px;z-index:0;
    background:conic-gradient(from var(--bes-a),var(--accent),var(--violet),var(--amber),var(--accent));
    filter:blur(17px);opacity:.75}
  .sp-mark::after{content:"";position:absolute;inset:-3px;border-radius:27px;z-index:1;
    background:conic-gradient(from var(--bes-a),var(--accent),var(--violet),var(--amber),var(--accent));
    padding:3px;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
  .sp-logo{position:relative;z-index:2;width:92px;height:92px;border-radius:24px;display:grid;place-items:center;color:#fff;
    font-family:Georgia,serif;font-weight:700;font-size:48px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));
    box-shadow:0 14px 38px rgba(15,110,106,.4)}
  .sp-spark{position:absolute;z-index:3;top:-7px;right:-7px;width:30px;height:30px;color:#fff;filter:drop-shadow(0 2px 7px rgba(0,0,0,.35))}
  .sp-name{position:relative;font-family:Georgia,serif;font-size:27px;font-weight:700;letter-spacing:-.01em;color:var(--ink);overflow:hidden}
  .sp-name::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.75) 50%,transparent 65%);transform:translateX(-130%)}
  .sp-tag{font-size:13px;color:var(--muted);margin-top:-8px;letter-spacing:.03em}
  @media (prefers-reduced-motion: no-preference){
    .sp-mark::before{animation:bes-spin 3s linear infinite,bes-breathe 2.4s var(--ease) infinite}
    .sp-mark::after{animation:bes-spin 3s linear infinite}
    .sp-logo{animation:pop .7s var(--ease) both}
    .sp-spark{animation:pop .6s var(--ease) .12s both,bes-twinkle 1.9s var(--ease) .9s infinite}
    .sp-name{animation:bes-rise .6s var(--ease) .14s both}
    .sp-name::after{animation:bes-shimmer 1.5s var(--ease) .5s 1}
    .sp-tag{animation:bes-rise .6s var(--ease) .26s both}
  }
  @keyframes bes-spin{to{--bes-a:360deg}}
  @keyframes bes-breathe{0%,100%{opacity:.55;filter:blur(16px)}50%{opacity:.95;filter:blur(22px)}}
  @keyframes bes-shimmer{to{transform:translateX(130%)}}
  @keyframes bes-twinkle{0%,100%{opacity:1;transform:scale(1) rotate(0deg)}50%{opacity:.65;transform:scale(.82) rotate(18deg)}}
  @keyframes bes-rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
  @keyframes load{from{width:0}to{width:100%}}

  .backlink{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 0;margin:6px 0 2px;transition:color .2s var(--ease)}
  .backlink:hover{color:var(--accent-ink)} .backlink .ic{width:16px;height:16px}
  .seclabel{display:flex;align-items:center;gap:8px;margin:22px 0 14px;font-weight:700;font-size:16px}
  .seclabel .ic{width:18px;height:18px;color:var(--accent-ink)}

  .grid{display:grid;gap:16px} @media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}

  .track{position:relative;display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);overflow:hidden;transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  .track:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)} .track:active{transform:translateY(-1px) scale(.995)}
  .track.alt:hover{border-color:var(--violet)}
  .track .tile{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:2px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .track.alt .tile{background:linear-gradient(150deg,var(--violet),#4f40a8);box-shadow:0 6px 16px rgba(109,91,208,.32)}
  .track .tile .ic{width:26px;height:26px;stroke-width:1.9}
  .track b{font-size:19px} .track small{color:var(--muted);font-size:14px;line-height:1.5}
  .track .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:14px}
  .track.alt .go{color:var(--violet)} .track .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)}
  .track:hover .go .ic{transform:translateX(3px)}

  .vak{position:relative;display:flex;flex-direction:column;gap:9px;text-align:left;width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow);text-decoration:none;color:inherit;overflow:hidden;transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  button.vak:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)} button.vak:active{transform:translateY(-1px) scale(.995)}
  .vak.soon{opacity:.72;cursor:default}
  .vak.ghost{background:transparent;border-style:dashed;box-shadow:none;align-items:center;justify-content:center;text-align:center;color:var(--muted);min-height:150px;cursor:default}
  .tile{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:2px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .tile.a{background:linear-gradient(150deg,var(--amber),#9c5f12);box-shadow:0 6px 16px rgba(201,130,31,.3)}
  .tile .ic{width:26px;height:26px;stroke-width:1.9}
  .vak b{font-size:19px} .vak small{color:var(--muted);font-size:14px;line-height:1.5}
  .vak .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:14px}
  .vak .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)} button.vak:hover .go .ic{transform:translateX(3px)}
  .pill{position:absolute;top:16px;right:16px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--good-soft);color:var(--good);display:inline-flex;align-items:center;gap:5px;letter-spacing:.2px}
  .pill.soon{background:var(--amber-soft);color:var(--amber)} html[data-theme="dark"] .pill.soon{background:#2e2515;color:#e0a64a}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.8s var(--ease) infinite}
  .ghost .plus{width:42px;height:42px;border-radius:50%;border:1.5px dashed var(--line);display:grid;place-items:center;margin-bottom:10px} .ghost .plus .ic{width:20px;height:20px}

  .modebanner{display:flex;align-items:center;gap:10px;margin:0 0 14px;padding:11px 14px;border-radius:var(--r);background:var(--accent-soft);color:var(--accent-ink);font-size:13.5px;font-weight:600}
  .modebanner.v{background:var(--violet-soft);color:var(--violet)} .modebanner .ic{width:18px;height:18px}
  .warmcard{border:1.5px solid var(--violet);background:var(--violet-soft);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;gap:11px;align-items:flex-start}
  .warmcard .ic{width:22px;height:22px;color:var(--violet);flex:none}
  .warmcard p{margin:5px 0 0;color:var(--muted);font-size:13.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px}
  .row{display:flex;gap:14px;align-items:center;justify-content:space-between}
  .toggle{width:48px;height:28px;border-radius:999px;border:none;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s var(--ease)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .32s cubic-bezier(.34,1.56,.64,1);will-change:left}
  .toggle.on{background:var(--violet)} .toggle.on .knob{left:23px}

  footer{margin-top:38px;text-align:center;color:var(--muted);font-size:13px}

  @keyframes fwd{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
  @keyframes bwd{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes upin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: no-preference){
    .view-fwd{animation:fwd .34s var(--ease) both} .view-bwd{animation:bwd .34s var(--ease) both}
    .grid>*{animation:upin .42s var(--ease) both}
    .grid>*:nth-child(1){animation-delay:.05s} .grid>*:nth-child(2){animation-delay:.12s} .grid>*:nth-child(3){animation-delay:.19s} .grid>*:nth-child(4){animation-delay:.26s}
  }
  @media (prefers-reduced-motion: reduce){
    .view-fwd,.view-bwd{animation:fade .2s ease both} *{transition-duration:.001ms!important}
  }

  /* ---- Bijdragen / Deel je samenvattingen ---- */
  button.vak.soon{cursor:pointer;opacity:.9}
  button.vak.soon:hover{transform:translateY(-4px);border-color:var(--accent);opacity:1;box-shadow:var(--shadow-lg)}
  button.vak.ghost{cursor:pointer}
  button.vak.ghost:hover{border-color:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow)}
  .cwrap{max-width:560px;margin:0 auto}
  .cintro{color:var(--muted);margin:0 0 18px;line-height:1.55}
  .dropzone{border:2px dashed var(--line);border-radius:var(--r);padding:30px 18px;text-align:center;cursor:pointer;background:var(--card);transition:border-color .25s var(--ease),background .25s var(--ease),transform .15s var(--ease)}
  .dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-soft)}
  .dropzone.drag{transform:scale(1.01)}
  .dropzone .dz-ic{width:38px;height:38px;color:var(--accent-ink);margin-bottom:8px}
  .dropzone b{display:block;font-size:15px;margin-bottom:3px} .dropzone small{color:var(--muted);font-size:13px}
  .filechips{display:flex;flex-direction:column;gap:8px;margin:14px 0 2px}
  .filechip{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13.5px}
  @media (prefers-reduced-motion: no-preference){ .filechip{animation:upin .28s var(--ease) both} }
  .filechip>.ic{width:18px;height:18px;color:var(--accent-ink);flex:none}
  .filechip .fn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filechip .fsz{color:var(--muted);font-size:12px;flex:none}
  .filechip .rm{border:none;background:none;color:var(--muted);cursor:pointer;display:flex;padding:3px;border-radius:6px;transition:color .2s,background .2s}
  .filechip .rm:hover{color:#c23b54;background:var(--bg2)} .filechip .rm .ic{width:16px;height:16px}
  .clabel{display:block;font-size:13px;font-weight:600;margin:16px 0 6px}
  .cinput{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink);font-family:inherit;font-size:15px;outline:none;transition:border-color .2s var(--ease),box-shadow .2s var(--ease);box-sizing:border-box}
  .cinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  select.cinput{cursor:pointer} textarea.cinput{resize:vertical;min-height:64px}
  .csubmit{width:100%;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:12px;min-height:50px;font-size:16px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 16px rgba(15,110,106,.28);transition:transform .12s var(--ease),background .2s var(--ease)}
  .csubmit:hover{background:var(--accent-ink)} .csubmit:active{transform:scale(.985)} .csubmit:disabled{opacity:.65;cursor:default;box-shadow:none}
  .csubmit .ic{width:18px;height:18px}
  .cerr{color:#c23b54;font-size:13.5px;margin-top:12px;line-height:1.5}
  .spin{width:18px;height:18px;border:2.4px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block}
  @media (prefers-reduced-motion: no-preference){ .spin{animation:spin .7s linear infinite} }
  @keyframes spin{to{transform:rotate(360deg)}}
  .csuccess{text-align:center;padding:34px 10px}
  .checkwrap{width:84px;height:84px;border-radius:50%;background:var(--good-soft);display:grid;place-items:center;margin:0 auto 18px}
  .checkwrap svg{width:46px;height:46px;stroke:var(--good);stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .checkwrap .cp{stroke-dasharray:44;stroke-dashoffset:0}
  .csuccess h2{margin:0 0 10px} .csuccess p{color:var(--muted);line-height:1.6;margin:0 auto;max-width:34em}
  @media (prefers-reduced-motion: no-preference){
    .checkwrap{animation:pop .55s var(--ease) both}
    .checkwrap .cp{stroke-dashoffset:44;animation:draw .5s var(--ease) .25s forwards}
    .csuccess h2{animation:upin .5s var(--ease) .15s both} .csuccess p{animation:upin .5s var(--ease) .25s both}
  }
  @keyframes draw{to{stroke-dashoffset:0}}
  .usecount{display:inline-flex;align-items:center;gap:8px;margin:18px auto 0;font-size:13.5px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 15px;box-shadow:var(--shadow)}
  .usecount b{color:var(--ink);font-weight:700}
  .usecount .uc-dot{width:8px;height:8px;border-radius:50%;background:var(--good);flex:none}
  @media (prefers-reduced-motion: no-preference){ .usecount .uc-dot{animation:ucpulse 2.2s var(--ease) infinite} }
  @keyframes ucpulse{0%,100%{box-shadow:0 0 0 0 rgba(31,138,76,.45)}70%{box-shadow:0 0 0 7px rgba(31,138,76,0)}}

  /* ---- Wat is nieuw ---- */
  .whatsnew{border:1.5px solid var(--line);border-radius:var(--r-lg);background:var(--card);box-shadow:var(--shadow);overflow:hidden;margin:0 0 22px}
  .wn-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .18s var(--ease);border:none;background:none;width:100%;text-align:left;color:var(--ink);font-family:inherit;font-size:15px;font-weight:700}
  .wn-head:hover{background:var(--bg2)}
  .wn-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--good-soft);color:var(--good);letter-spacing:.3px;flex:none}
  .wn-badge.hide{display:none}
  .wn-chev{margin-left:auto;width:18px;height:18px;stroke:var(--muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;transition:transform .28s var(--ease);flex:none}
  .whatsnew.open .wn-chev{transform:rotate(180deg)}
  .wn-body{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
  .whatsnew.open .wn-body{max-height:600px}
  .wn-list{padding:4px 18px 18px;display:flex;flex-direction:column;gap:10px}
  .wn-item{display:flex;gap:11px;align-items:flex-start}
  .wn-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;margin-top:6px}
  .wn-dot.amber{background:var(--amber)}
  .wn-dot.violet{background:var(--violet)}
  .wn-item b{font-size:14px;display:block;line-height:1.3}
  .wn-item small{color:var(--muted);font-size:12.5px;line-height:1.5}
  .wn-date{font-size:11px;color:var(--muted);padding:0 18px 14px;text-align:right}
  @media (prefers-reduced-motion: no-preference){ .wn-item{animation:upin .32s var(--ease) both} }
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="brand"><span class="logo">B</span><div>Berie’s exam space<small>oefen voor je examen</small></div></div>

  // laadscherm netjes laten verdwijnen
  var _sp=document.getElementById("splash");
  if(_sp){
    var _red=false; try{ _red=window.matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(e){}
    setTimeout(function(){ _sp.classList.add("hide"); setTimeout(function(){ if(_sp&&_sp.parentNode) _sp.parentNode.removeChild(_sp); }, 700); }, _red?300:1850);
  }
})();
</script>
